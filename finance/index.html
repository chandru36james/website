<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

  <title>VGot You Finance — Intelligent Lending. Trusted Collections.</title>
  <meta name="description" content="Enterprise-grade loan management and financial ledger platform for microfinance institutions, NBFCs, and community lenders." />
  <meta name="author" content="VGot You Finance" />

  <!-- Prevent search indexing (private SaaS) -->
  <meta name="robots" content="noindex, nofollow" />

  <!-- Theme -->
  <meta name="theme-color" content="#DC2626" />
  <meta name="color-scheme" content="light" />
  <meta name="application-name" content="VYFL Finance" />

  <!-- PWA -->
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="VYFL Finance" />
  <link rel="apple-touch-icon" href="/icons/icon-192.png" />
  <link rel="manifest" href="/manifest.webmanifest" />

  <!-- Favicon -->
  <link rel="icon" type="image/x-icon" href="/favicon.ico" />
  <link rel="icon" type="image/png" sizes="32x32" href="/icons/icon-192.png" />

  <!-- Open Graph (for sharing) -->
  <meta property="og:type" content="website" />
  <meta property="og:title" content="VGot You Finance FMS" />
  <meta property="og:description" content="Enterprise-grade loan management platform for microfinance institutions and NBFCs." />
  <meta property="og:image" content="/icons/icon-512.png" />

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Space+Grotesk:wght@500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap"
    rel="stylesheet"
  />
</head>

<body>
  <noscript>JavaScript is required to run VGot You Finance FMS.</noscript>

  <div id="root">
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      html, body {
        height: 100%;
        background: #ffffff;
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
        -webkit-font-smoothing: antialiased;
      }
      #loader {
        position: fixed; inset: 0;
        display: flex; flex-direction: column;
        align-items: center; justify-content: center;
        background: #ffffff;
        gap: 20px;
        transition: opacity 0.3s ease;
      }
      .loader-logo {
        width: 56px; height: 56px;
        background: #DC2626;
        border-radius: 18px;
        display: flex; align-items: center; justify-content: center;
        box-shadow: 0 8px 32px rgba(220,38,38,0.25);
      }
      .loader-logo svg {
        width: 30px; height: 30px; fill: none;
        stroke: white; stroke-width: 2.5;
        stroke-linecap: round; stroke-linejoin: round;
      }
      .loader-spinner {
        width: 32px; height: 32px;
        border: 3px solid #F1F5F9;
        border-top: 3px solid #DC2626;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }
      @keyframes spin { to { transform: rotate(360deg); } }
      .loader-text {
        text-align: center;
      }
      .loader-text h1 {
        font-size: 18px; font-weight: 800;
        color: #0F172A; letter-spacing: -0.02em;
      }
      .loader-text p {
        font-size: 12px; color: #94A3B8;
        font-family: 'JetBrains Mono', monospace;
        margin-top: 4px;
      }
    </style>

    <div id="loader">
      <div class="loader-logo">
        <!-- Landmark icon inline SVG -->
        <svg viewBox="0 0 24 24">
          <path d="M3 22h18M6 18v-7M10 18v-7M14 18v-7M18 18v-7M12 2l9 5H3l9-5z"/>
        </svg>
      </div>
      <div class="loader-spinner"></div>
      <div class="loader-text">
        <h1>VGot You Finance</h1>
        <p>Initializing secure workspace...</p>
      </div>
    </div>
  </div>

  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
