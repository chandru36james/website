  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body, .brands { width: 100%; height: 100vh; }
    body {
      font-family: 'Poppins', sans-serif;
      background: #111;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .brands {
      display: flex;
      overflow: hidden;
    }
    .brand {
      flex: 1;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      transition: flex 0.6s ease;
      cursor: pointer;
    }
    .brand::before {
      content: "";
      position: absolute;
      inset: 0;
      background: rgba(0, 0, 0, 0.55);
      transition: background 0.4s;
    }

    /* Logo container */
    .brand-logo {
      position: relative;
      z-index: 2;
      text-align: center;
    }
    .brand-logo img {
      max-width: 180px;
      max-height: 120px;
      object-fit: contain;
      filter: drop-shadow(0 3px 8px rgba(0,0,0,0.6));
      transition: transform 0.3s;
    }
    .brand:hover .brand-logo img {
      transform: scale(1.05);
    }

    /* Details on hover */
    .brand-details {
      position: absolute;
      bottom: 15%;
      left: 50%;
      transform: translate(-50%, 20px);
      opacity: 0;
      text-align: center;
      transition: all 0.4s ease;
      z-index: 3;
    }
    .brand-details p {
      margin: 10px 0;
      font-size: 1rem;
      text-shadow: 0 1px 4px rgba(0,0,0,0.7);
    }
    .social-icons {
      display: flex;
      gap: 15px;
      justify-content: center;
      margin-top: 10px;
    }
    .social-icons a {
      color: #fff;
      font-size: 1.3rem;
      width: 38px;
      height: 38px;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 1px solid rgba(255,255,255,0.3);
      border-radius: 50%;
      transition: all 0.3s;
    }
    .social-icons a:hover {
      background: #fff;
      color: #111;
      transform: scale(1.1);
    }

    /* Hover expand */
    .brand:hover {
      flex: 2;
    }
    .brand:hover::before {
      background: rgba(0,0,0,0.7);
    }
    .brand:hover .brand-details {
      opacity: 1;
      transform: translate(-50%, 0);
    }

    /* Responsive stacking on mobile */
    @media (max-width: 900px) {
      .brands { flex-direction: column; }
      .brand { height: 33.33%; }
      .brand-details { bottom: 10%; }
    }
  </style>
</head>
